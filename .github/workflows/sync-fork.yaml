name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync with upstream
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "ynyrllw"
          git config user.email "ynyrllw@users.noreply.github.com"
          git remote add upstream https://github.com/qaz741wsd856/warden-worker.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push "https://x-access-token:${TOKEN}@github.com/ynyrllw/warden-worker.git" main
