name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Sync with upstream
        run: |
          git config user.name "ynyrllw"
          git config user.email "ynyrllw@users.noreply.github.com"
          git remote add upstream https://github.com/qaz741wsd856/warden-worker.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push git@github.com:ynyrllw/warden-worker.git main
